  <path d="M1465 1330 C1465 1310 1875 1310 1875 1270" class="arrow-return"/>

  <rect x="60" y="1490" width="2080" height="118" rx="18" class="band"/>
  <text x="82" y="1520" class="lane">TOOL RAIL · 使用工具与边界</text>
  <circle cx="100" cy="1562" r="6" class="dot"/><text x="118" y="1568" class="body">Codex + 15 Skills</text>
  <circle cx="410" cy="1562" r="6" class="dot"/><text x="428" y="1568" class="body">Image Generation</text>
  <circle cx="720" cy="1562" r="6" class="dot"/><text x="738" y="1568" class="body">Python 3.11/3.12 + Pillow 11.3</text>
  <circle cx="1160" cy="1562" r="6" class="dot"/><text x="1178" y="1568" class="body">FFmpeg / ffprobe / libx264</text>
  <circle cx="1545" cy="1562" r="6" class="dot"/><text x="1563" y="1568" class="body">Prevzi / Blender / 2D-3D Previs</text>
  <circle cx="1950" cy="1562" r="6" class="dot"/><text x="1968" y="1568" class="body">第三方 Omni 平台</text>
  <text x="82" y="1594" class="muted">禁止替代路线：T2V · 单图 I2V · 首尾帧 · endpoint-frame interpolation　｜　仓库终点：P2；外部运行闭环：用户接受画面；不含音乐、剪辑、调色、独立 QC</text>

  <text x="60" y="1640" class="muted">Repository: qiuranke99/codex-skills · Source contracts are hash-bound and stage-owned.</text>
</svg>
