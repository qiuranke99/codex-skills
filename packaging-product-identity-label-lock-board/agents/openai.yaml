interface:
  display_name: "Packaging Product Identity Board"
  short_description: "A borderless 9-region board with verified packaging copy."
  default_prompt: "Use $packaging-product-identity-label-lock-board to turn one to three product photos plus optional close-ups/artwork into exactly one clean horizontal 16:9 video-model asset board. OCR all visible copy into a source-cited ordered ledger, visually approve exact lines, compile and embed the complete copy block verbatim, then validate the final pixels and reject visible gibberish. Use seven complete upright views plus two source-grounded close-ups by default, never more than ten total regions, and one continuous studio background with no frames, cards, grid lines, captions, or blank cells. Publish the complete prompt inline before worker spawn; then use one fresh fork_turns=none image worker, preserve the prompt/reference lineage, and return the prompt, copy artifacts, board, hashes, and validation state."
policy:
  allow_implicit_invocation: false
