interface:
  display_name: "Packaging Product Identity Board"
  short_description: "One clean 8-view board for text-heavy packaging."
  default_prompt: "Use $packaging-product-identity-label-lock-board to turn ordinary product photos into exactly one clean horizontal 16:9 video-model asset board with eight complete upright views and four to six populated source-evidenced details. Treat OCR as a 45-second nonblocking discovery pass, compile any larger source ledger into at most five imagegen-bound references, publish the complete prompt inline before worker spawn together with both file/content hashes, use one fresh fork_turns=none non-decision worker whose first and only tool call is imagegen, accept only the audited single file-terminal-LF transport variance, reuse a completed image instead of regenerating for that binding-only condition, enforce the dispatch and generation time budgets, show a resolver-bound raw preview before QA, and return the complete prompt with every success or failure state."
policy:
  allow_implicit_invocation: false
