interface:
  display_name: "AI Visual Director"
  short_description: "Story-first ad-film director workflow for product-faithful storyboard images and Google Omni video prompts."
  default_prompt: "Use $ai-visual-director for this brief and references. Build the internal story engine, product identity lock, shot plan, and validation chain, then show only the storyboard image path(s) and paste-ready Google Omni video prompts unless validation fails."
startup_policy:
  startup_evidence_artifact: "05_agent_orchestration.json"
  block_on_missing_required_agents: true
  required_agents:
    - "creative_director_agent"
    - "director_agent"
    - "screenwriter_agent"
    - "art_director_agent"
    - "google_omni_prompt_expert_agent"
  required_status: "completed"
  simulation_allowed: false
