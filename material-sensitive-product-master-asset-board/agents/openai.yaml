interface:
  display_name: "Material-Sensitive Product Master Asset Board"
  short_description: "Research-backed material board from even one clear front image."
  default_prompt: "Use $material-sensitive-product-master-asset-board with my local product image(s). Treat one clear front image as sufficient input: resolve visible identity conflicts, use the in-app Browser when available to research the exact product, same package family, then packaging archetype, and record an auditable fallback if Browser is unavailable. Freeze one material_research.v1 artifact containing rights_status, selected_generation_reference, graded structure_claims, and source coverage; then derive a 4-10 panel source contract with no fixed multi-angle quota. Never pass research-only, same-family, or archetype media to imagegen, and never invent rear copy, exact dimensions, materials, marks, or mechanisms. Publish the complete source-bound prompt before each fresh non-decision worker attempt; bind and inspect the actual PNG against direct and reconstruction evidence; accept a sole missing file-terminal LF without weakening prompt/reference matching; then deterministically publish the accepted board, full generation prompt/hash, full image-specific 4K prompt/hash, QA, evidence hash, and real external status."
policy:
  allow_implicit_invocation: false
