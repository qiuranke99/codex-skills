interface:
  display_name: "Character Casting Lock Board"
  short_description: "Casting locks with complete per-board 4K prompt pairs."
  default_prompt: "Use $character-casting-lock-board with my selected references to request horizontal 16:9 casting boards. End each generation turn at imagegen; after inspecting every board, publish in one later final main result every generated board's complete exact final_generation_prompt plus generation_prompt_sha256 and complete image-specific final_4k_enhancement_prompt plus 4k_enhancement_prompt_sha256, with published_prompt_pair_count equal to generated_board_count."
policy:
  allow_implicit_invocation: true
